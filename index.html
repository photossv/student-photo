<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concession Card Photo Upload Wizard</title>
    <!-- Include Stable Cropper.css via CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .img-container { width: 100%; height: 400px; margin-top: 20px; background-color: #eaebed; overflow: hidden; position: relative; }
        img { max-width: 100%; display: block; }
        
        /* Styled Controls */
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .slider-group { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .slider-group label { font-weight: bold; font-size: 14px; }
        .slider-group input { width: 70%; }
        
        button, .link-btn { padding: 10px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        button:hover, .link-btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-success { background: #28a745; width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; }
        .btn-success:hover { background: #218838; }
        .btn-download { background: #ffc107; color: #212529; margin-top: 10px; padding: 12px 20px; font-size: 16px; }
        .btn-download:hover { background: #e0a800; }
        
        .portal-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #cccccc; }
        .btn-portal { background: #17a2b8; width: 100%; padding: 12px; font-size: 16px; }
        .btn-portal:hover { background: #138496; }

        #result { margin-top: 25px; }
        .error-msg { color: #dc3545; font-weight: bold; margin-top: 10px; }
        
        /* Updated Requirement Box styling */
        .requirement-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 6px; font-size: 14px; text-align: left; margin-bottom: 15px; border-left: 4px solid #ffc107; line-height: 1.4; }
        
        /* Hide the resizing handles of the cropper box to prevent confusion */
        .cropper-line, .cropper-point { display: none !important; }
        .cropper-face { cursor: move !important; background: transparent !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Concession Card Photo Setup</h2>
    
    <!-- Custom Photo Guideline Banner -->
    <div class="requirement-box">
        <strong>⚠️ Photo Requirement:</strong> Please upload a passport-style photo taken against a plain, light-colored or white background. Ensure your hair is neat and your face is fully visible.
    </div>
    
    <input type="file" id="upload" accept="image/jpeg, image/jpg, image/png, image/heic, .heic">
    
    <div class="img-container">
        <img id="image" src="" alt="Your photo preview will appear here">
    </div>

    <div class="controls">
        <!-- Touch Fallback Adjustment Buttons -->
        <div class="btn-group">
            <button class="btn-secondary" id="moveLeft">⬅️ Left</button>
            <button class="btn-secondary" id="moveRight">➡️ Right</button>
            <button class="btn-secondary" id="moveUp">⬆️ Up</button>
            <button class="btn-secondary" id="moveDown">⬇️ Down</button>
        </div>
        <div class="btn-group">
            <button class="btn-secondary" id="zoomIn">➕ Zoom In</button>
            <button class="btn-secondary" id="zoomOut">➖ Zoom Out</button>
        </div>

        <!-- Brightness Control Slider -->
        <div class="slider-group">
            <label for="brightness">Brightness:</label>
            <input type="range" id="brightness" min="50" max="150" value="100">
        </div>
        
        <button class="btn-success" id="saveBtn">1. Process Photo</button>
    </div>

    <div id="result"></div>

    <!-- Student Portal Link Section -->
    <div class="portal-section">
        <p style="color: #666; font-size: 14px;">Done saving your photo? Proceed to upload it here:</p>
        <a href="https://student.ite.edu.sg/psp/CS92PRD/?cmd=login&languageCd=ENG&">2. Go to Student Portal ➡️</a>
    </div>
</div>

<!-- Essential Lightweight Web Dependencies (Fast loading) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<script>
    let cropper;
    const image = document.getElementById('image');
    const upload = document.getElementById('upload');
    const brightnessSlider = document.getElementById('brightness');
    const saveBtn = document.getElementById('saveBtn');
    const resultDiv = document.getElementById('result');

    // Fast File Upload Processing
    upload.addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;
        
        let file = files[0];
        const fileExtension = file.name.split('.').pop().toLowerCase();

        // Safety limit to prevent extreme file size lockups
        if (file.size > 20 * 1024 * 1024) {
            alert("This file is too large. Please select a photo smaller than 20MB.");
            upload.value = "";
            return;
        }

        resultDiv.innerHTML = ""; 

        try {
            // Handle native Apple device HEIC formats instantly
            if (fileExtension === 'heic' || fileExtension === 'heif' || file.type === 'image/heic') {
                const conversionResult = await heic2any({
                    blob: file,
                    toType: "image/jpeg",
                    quality: 0.9
                });
                file = Array.isArray(conversionResult) ? conversionResult[0] : conversionResult;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                image.src = event.target.result;
                
                if (cropper) cropper.destroy();
                
                cropper = new Cropper(image, {
                    aspectRatio: 240 / 320, 
                    viewMode: 1, 
                    dragMode: 'move',
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    autoCropArea: 0.7
                });
            };
            reader.readAsDataURL(file);

        } catch (error) {
            console.error(error);
            alert("Could not load image file. Please try a standard JPG or PNG photo.");
            upload.value = "";
        }
    });

    // Adjustment Button Layout Logic
    document.getElementById('moveLeft').addEventListener('click', () => { if(cropper) cropper.move(-10, 0); });
    document.getElementById('moveRight').addEventListener('click', () => { if(cropper) cropper.move(10, 0); });
    document.getElementById('moveUp').addEventListener('click', () => { if(cropper) cropper.move(0, -10); });
    document.getElementById('moveDown').addEventListener('click', () => { if(cropper) cropper.move(0, 10); });
    document.getElementById('zoomIn').addEventListener('click', () => { if(cropper) cropper.zoom(0.1); });
    document.getElementById('zoomOut').addEventListener('click', () => { if(cropper) cropper.zoom(-0.1); });

    brightnessSlider.addEventListener('input', () => {
        if (cropper) {
            const container = document.querySelector('.cropper-container');
            container.style.filter = `brightness(${brightnessSlider.value}%)`;
        }
    });

    // Core Canvas Processing Engine (240x320 JPEG Output < 150KB)
    saveBtn.addEventListener('click', () => {
        if (!cropper) return;

        const croppedCanvas = cropper.getCroppedCanvas({
            width: 240,
            height: 320
        });

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = 240;
        finalCanvas.height = 320;
        const ctx = finalCanvas.getContext('2d');

        // Draw solid background layer
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, 240, 320);

        // Map adjusted image details onto base canvas template
        ctx.filter = `brightness(${brightnessSlider.value}%)`;
        ctx.drawImage(croppedCanvas, 0, 0, 240, 320);

        let quality = 0.95; 
        let finalDataUrl = finalCanvas.toDataURL('image/jpeg', quality);
        let fileSizeKB = (finalDataUrl.length * (3/4)) / 1024;

        // Compression downscaling system loop
        while (fileSizeKB > 150 && quality > 0.1) {
            quality -= 0.05;
            finalDataUrl = finalCanvas.toDataURL('image/jpeg', quality);
            fileSizeKB = (finalDataUrl.length * (3/4)) / 1024;
        }

        if (fileSizeKB > 150) {
            resultDiv.innerHTML = `<p class="error-msg">Error: Unable to drop file weight under 150KB threshold limit.</p>`;
        } else {
            resultDiv.innerHTML = `
                <h3>Final Concession Photo Ready</h3>
                <p style="color: #28a745; font-weight: bold;">Saved Format: JPEG (.jpg) | Size: ${fileSizeKB.toFixed(1)} KB</p>
                <img src="${finalDataUrl}" style="border:1px solid #ddd; margin: 0 auto 15px auto;">
                <a href="${finalDataUrl}" download="concession_photo.jpg" class="link-btn btn-download">📥 Download & Save Photo</a>
            `;
        }
    });
</script>

</body>
</html>
